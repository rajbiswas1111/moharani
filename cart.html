<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - SareeSilk</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <!-- Copy header code -->
    </header>

    <!-- Cart Section -->
    <section class="cart-page">
        <div class="container">
            <h1><i class="fas fa-shopping-cart"></i> Your Cart</h1>
            <div class="cart-container">
                <div class="cart-items" id="cartItems">
                    <p id="emptyCartMsg" class="empty-cart" style="display: none;">
                        Your cart is empty. <a href="products.html">Continue Shopping</a>
                    </p>
                </div>
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="cartSubtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping:</span>
                        <span>₹100</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="cartTotal">₹0</span>
                    </div>
                    <button class="checkout-btn" onclick="window.location.href='checkout.html'" id="checkoutBtn" disabled>
                        Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <!-- Copy footer -->
    </footer>

    <script src="script.js"></script>
</body>
</html>
